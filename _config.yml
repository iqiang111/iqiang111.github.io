# Basic Information 
title: Guoqiang Jia
position: M.S. Student
affiliation: Hefei University of Technology
email: 2025170751@mail.hfut.edu.cn

# Search Engine Optimization (SEO)
# The following information is used to improve the website traffic from search engines, e.g., Google.
keywords: Guoqiang Jia, time series analysis, anomaly prediction, machine learning
description: Academic homepage of Guoqiang Jia, focusing on multivariate time series analysis and anomaly prediction.

# GitHub Pages address. `relative_url` keeps assets and links working on
# nested Weekly pages while the site is published at the domain root.
url: https://iqiang111.github.io
baseurl: ""

# Links 
# If you don't need one of them, you may delete the corresponding line.
google_scholar: https://scholar.google.com/
github_link: https://github.com/iqiang111
# linkedin: https://www.linkedin.com/
# twitter: https://twitter.com/

# Images (e.g., your profile picture and your website's favicon) 
# "favicon" and "favicon_dark" are used for the light and dark modes, respectively. 
avatar: /assets/img/jgq2.png
favicon: /assets/img/favicon.png
favicon_dark: /assets/img/favicon-dark.png

# Footnote
# You may use the option to disable the footnote, "Powered by Jekyll and Minimal Light theme."
enable_footnote: true

# Auto Dark Mode
# You may use the option to disable the automatic dark theme
auto_dark_mode: true

# Font
# You can use this option to choose between Serif or Sans Serif fonts.
font: "Serif" # or "Sans Serif"

# Use this project as a remote theme for GitHub Pages
# See the guide here: https://docs.github.com/en/pages/setting-up-a-github-pages-site-with-jekyll/adding-a-theme-to-your-github-pages-site-using-jekyll
remote_theme: yaoyao-liu/minimal-light

# Weekly notes
# Add one Markdown file to `_weekly/` for each week. Jekyll will generate the
# archive and a standalone page for every note automatically.
collections:
  weekly:
    output: true
    permalink: /weekly/:name/

defaults:
  - scope:
      path: ""
      type: weekly
    values:
      layout: weekly
      lang: zh-CN

# Put this marker in a weekly note when you want to control its short preview.
excerpt_separator: "<!--more-->"

# The following files will be removed from the generated website.
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
